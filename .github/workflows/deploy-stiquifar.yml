name: Deploy STIQUIFAR

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        working-directory: "Front-End JS/STIQUIFAR"
        run: npm install

      - name: Gerar build
        working-directory: "Front-End JS/STIQUIFAR"
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar build
        uses: actions/upload-pages-artifact@v3
        with:
          path: "Front-End JS/STIQUIFAR/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4